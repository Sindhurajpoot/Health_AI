<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Guardian</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🩺 AI Health Guardian</h1>
    <p class="subtitle">
        Emotion-Aware Smart Healthcare Assistant
    </p>

    <div class="card">
        <textarea
            id="inputText"
            placeholder="Describe your symptoms and feelings here..."
        ></textarea>

        <button onclick="analyzeHealth()">
            Analyze Health
        </button>
    </div>

    <div id="resultBox" class="result-card" style="display:none;">

        <h2>Analysis Results</h2>

        <p><strong>Disease:</strong> <span id="disease"></span></p>
        <p><strong>Emotion:</strong> <span id="emotion"></span></p>
        <p><strong>Advice:</strong> <span id="advice"></span></p>
        <p><strong>AI Insight:</strong> <span id="insight"></span></p>

        <p><strong>Confidence Score:</strong>
            <span id="confidence"></span>%
        </p>

        <p><strong>Future Risk Prediction:</strong>
            <span id="futureRisk"></span>%
        </p>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <p id="riskText"></p>

        <div id="actionButtons"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
